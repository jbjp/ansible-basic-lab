---
- name: Handlers Playbook
  hosts: copenhagen
  gather_facts: true

  tasks:
    - name: Add line in file
      ansible.builtin.lineinfile:
        path: testfile.txt
        line: Hello automation world!
        create: yes
        mode: '0755'
      notify: Hello World

  handlers:
    - name: Hello World
      ansible.builtin.debug:
        msg: "Hello World"
